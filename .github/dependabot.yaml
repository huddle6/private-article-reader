version: 2
updates:
  # Enable version updates for npm (JavaScript/TypeScript) 
  - package-ecosystem: "npm"
    # Look for `package.json` and `lock` files in the root directory
    directory: "/"
    # Check for updates once a day (you can also use "weekly" or "monthly")
    schedule:
      interval: "monthly"
    # Optionally, group non-major updates into a single PR
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

    labels:
      - "dependencies"
      - "npm"
    # Limit the number of open PRs for npm dependencies
    open-pull-requests-limit: 10

  # If you have GitHub Actions workflows, you can also keep them updated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "github-actions"
